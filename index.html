<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lumen — Hymn Voice Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#15110c;--bg2:#1f1810;--panel:#2a2218;--gold:#b07d2a;--gold-bright:#d9a44a;--cream:#f3e9d6;--muted:#9c8a6e;--green:#3f9d5a;--blue:#1f6ad6;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--cream);font-family:'Jost',sans-serif;display:flex;flex-direction:column;height:100dvh;user-select:none;}
  header{position:relative;z-index:2;padding:7px 16px 4px;text-align:center;flex:0 0 auto;}
  .hymn-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:20px;line-height:1;}
  .hymn-sub{font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-top:3px;}
  main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;min-height:0;}
  .roll-wrap{flex:1;position:relative;min-height:0;margin:6px 8px;border-radius:12px;overflow:hidden;box-shadow:0 12px 34px rgba(0,0,0,.5), inset 0 0 0 1px rgba(205,187,150,.3);}
  canvas{display:block;width:100%;height:100%;touch-action:none;cursor:grab;}
  canvas:active{cursor:grabbing;}
  .controls{position:relative;z-index:3;display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap;padding:7px 10px calc(9px + env(safe-area-inset-bottom));background:var(--bg2);border-top:1px solid #3a2f22;flex:0 0 auto;}
  button{font-family:'Jost',sans-serif;font-size:12.5px;letter-spacing:.03em;color:var(--cream);background:var(--panel);border:1px solid #3a2f22;padding:9px 14px;border-radius:40px;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;gap:6px;}
  button:hover{border-color:var(--gold-bright);color:var(--gold-bright);}button:active{transform:scale(.96);}
  button.primary{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#2a1f10;border:none;font-weight:600;box-shadow:0 4px 16px rgba(217,164,74,.3);}
  button.primary:hover{filter:brightness(1.07);color:#2a1f10;}
  button.live.on{background:var(--green);color:#eafff0;border-color:var(--green);box-shadow:0 0 16px rgba(63,157,90,.45);}
  button.inst.voice{border-color:var(--blue);color:#8fb8f0;}
  button.on2{border-color:var(--green);color:var(--green);}
  .stepper{display:inline-flex;align-items:center;border:1px solid #3a2f22;border-radius:40px;overflow:hidden;background:var(--panel);}
  .stepper button{border:none;border-radius:0;padding:9px 12px;background:transparent;}
  .stepper .val{padding:0 8px;font-size:12px;color:var(--muted);min-width:64px;text-align:center;}
  .stepper .val b{color:var(--cream);font-weight:500;}
  @media (orientation:landscape) and (max-height:560px){header{padding:3px 14px 1px;}.hymn-title{font-size:15px;}.hymn-sub{display:none;}.roll-wrap{margin:4px 8px;}.controls{padding:4px 8px calc(5px + env(safe-area-inset-bottom));gap:5px;}button{padding:6px 11px;font-size:11.5px;}.stepper button{padding:6px 10px;}}
  .overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(10,8,5,.86);backdrop-filter:blur(6px);}
  .overlay.show{display:flex;}
  .card{max-width:390px;width:100%;background:var(--panel);border:1px solid #3a2f22;border-radius:18px;padding:26px 24px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5);}
  .card h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:26px;color:var(--gold-bright);margin-bottom:8px;}
  .card p{font-size:14px;line-height:1.5;color:var(--muted);margin-bottom:14px;}.card p b{color:var(--cream);}
  .big-note{font-family:'Cormorant Garamond',serif;font-size:54px;color:var(--cream);line-height:1;margin:6px 0;}
  .range-row{display:flex;justify-content:space-around;margin:16px 0;}
  .range-row .item{font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
  .range-row .item b{display:block;font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--gold-bright);letter-spacing:0;margin-top:4px;}
  .lvl{height:8px;border-radius:8px;background:var(--bg);overflow:hidden;margin:14px 0;border:1px solid #3a2f22;}.lvl > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--green));transition:width .08s;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:6px 0 14px;}
  .chip{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cream);background:rgba(176,125,42,.18);border:1px solid rgba(176,125,42,.4);padding:4px 12px;border-radius:30px;}
  .hint{font-size:11px;color:var(--muted);letter-spacing:.04em;margin-top:6px;}.card button{margin-top:4px;}
</style>
</head>
<body>
<!-- ===== SONG TITLE — swap per song (see BUILD-PLAYBOOK.md) ===== -->
<header><div class="hymn-title">Amazing Grace</div><div class="hymn-sub">New Britain · G major · 3/4 · Baptist Hymnal 330</div></header>
<!-- ===== END SONG TITLE ===== -->
<main>
  <div class="roll-wrap"><canvas id="roll"></canvas></div>
  <div class="controls">
    <button class="primary" id="playBtn">▶ Play</button>
    <button class="live" id="micBtn">● Mic</button>
    <button class="inst" id="instBtn">♪ Guitar</button>
    <button class="drill" id="drillBtn">Drill: off</button>
    <button id="fullBtn">Whole hymn</button>
    <button id="lblBtn" class="on2">Do-Re-Mi</button>
    <button id="wordsBtn">Words</button>
    <div class="stepper"><button id="verseDown">–</button><span class="val">verse <b id="verseVal">1</b>/5</span><button id="verseUp">+</button></div>
    <div class="stepper"><button id="keyDown">–</button><span class="val">key <b id="keyVal">G</b></span><button id="keyUp">+</button></div>
    <div class="stepper"><button id="tempoDown">–</button><span class="val"><b id="tempoVal">76</b>bpm</span><button id="tempoUp">+</button></div>
    <div class="stepper"><button id="zoomOut">–</button><span class="val">zoom</span><button id="zoomIn">+</button></div>
    <button id="rangeBtn">My range</button>
    <button id="coachBtn">Coach</button>
    <button id="helpBtn">? Guide</button>
  </div>
</main>
<div class="overlay" id="overlay"><div class="card" id="card"></div></div>

<script>
const NOTE_FREQ={C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196.00,A3:220.00,B3:246.94,C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,C6:1046.50};
/* ===== SONG DATA — swap this whole block per song (see BUILD-PLAYBOOK.md) ===== */
const TUNE=[["D4",1],["G4",2],["B4",.5],["G4",.5],["B4",2],["A4",1],["G4",2],["E4",1],["D4",2],["D4",1],["G4",2],["B4",.5],["G4",.5],["B4",2],["A4",1],["D5",5],["B4",1],["D5",1.5],["B4",.5],["D5",.5],["B4",.5],["G4",2],["D4",1],["E4",1.5],["G4",.5],["G4",.5],["E4",.5],["D4",2],["D4",1],["G4",2],["B4",.5],["G4",.5],["B4",2],["A4",1],["G4",5]];
const VERSES=[
  ["A-","maz-","ing","","grace","how","sweet","the","sound,","that","saved","a","","wretch","like","me!","I","once","","was","","lost,","but","now","","am","","found,","was","blind,","but","","now","I","see."],
  ["'Twas","grace","that","","taught","my","heart","to","fear,","and","grace","my","","fears","re-","lieved;","how","pre-","","cious","","did","that","grace","","ap-","","pear","the","hour","I","","first","be-","lieved!"],
  ["Thro'","man-","y","","dan-","gers,","toils,","and","snares,","I","have","al-","","read-","y","come;","'Tis","grace","","hath","","bro't","me","safe","","thus","","far,","and","grace","will","","lead","me","home."],
  ["The","Lord","has","","prom-","ised","good","to","me,","His","word","my","","hope","se-","cures;","He","will","","my","","shield","and","por-","","tion","","be","as","long","as","","life","en-","dures."],
  ["When","we've","been","","there","ten","thou-","sand","years,","bright","shin-","ing","","as","the","sun,","we've","no","","less","","days","to","sing","","God's","","praise","than","when","we","","first","be-","gun."]
];
const PHRASE_END=[8,15,27,34], SEG_ENDS=[4,9,14,16,22,28,32,35], LINE_RANGES=[[0,8],[9,15],[16,27],[28,34]];
/* ===== END SONG DATA ===== */
let transpose=0,bpm=76,countBeats=3,verse=0,inst='g',practiceLine=-1,playStart=0,playEnd=0;
let fullSong=false,labelMode='solfege',zoom=1;
const KEYS=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
function semi(f,s){return f*Math.pow(2,s/12);}
function buildNotes(){const beat=60/bpm;let t=0,idx=0,arr=[];const vs=fullSong?[0,1,2,3,4]:[verse];vs.forEach((v,vi)=>{for(let i=0;i<TUNE.length;i++){const note=TUNE[i][0],beats=TUNE[i][1];const _pe=PHRASE_END.includes(i),_dur=beats*beat,_rel=_pe?Math.min(beat,_dur*0.4):0;arr.push({syl:VERSES[v][i],note,start:t,dur:_dur,sustain:_dur-_rel,beats,freq:semi(NOTE_FREQ[note],transpose),breath:_pe,phraseEnd:_pe,v,vi,idx:idx++});t+=_dur;}if(vi<vs.length-1)t+=2*beat;});return arr;}
let NOTES=buildNotes(),SEGMENTS=[],LINES=[],BARS=[];
function buildSegments(){SEGMENTS=[];let start=0;SEG_ENDS.forEach(end=>{const f=start,l=end-1;SEGMENTS.push({f,l,startT:NOTES[f].start,endT:NOTES[l].start+NOTES[l].dur,breath:PHRASE_END.includes(l)});start=end;});}
function buildLines(){LINES=LINE_RANGES.map(([f,l])=>({f,l,startT:NOTES[f].start,endT:NOTES[l].start+NOTES[l].dur}));}
function buildBars(){const beat=60/bpm;BARS=[];const vs=fullSong?[0,1,2,3,4]:[verse];let t=0;vs.forEach((v,vi)=>{for(let off=1;off<48;off+=3)BARS.push(t+off*beat);t+=48*beat;if(vi<vs.length-1)t+=2*beat;});}
function buildStruct(){buildSegments();buildLines();buildBars();}
const lastEnd=()=>NOTES[NOTES.length-1].start+NOTES[NOTES.length-1].dur;
function setPlayRange(){if(practiceLine<0){playStart=0;playEnd=lastEnd();}else{playStart=LINES[practiceLine].startT;playEnd=LINES[practiceLine].endT;}}
function rebuild(){NOTES=buildNotes();buildStruct();setPlayRange();scrubT=Math.max(playStart,Math.min(playEnd,scrubT));}
buildStruct();
function keyLabel(){let i=(7+transpose)%12;if(i<0)i+=12;return KEYS[i];}

const DIA=[0,0,1,1,2,3,3,4,4,5,5,6];
function freqToMidi(f){return 69+12*Math.log2(f/440);}
function staffOfMidi(mi){const pc=((mi%12)+12)%12,oct=Math.floor(mi/12)-1;return oct*7+DIA[pc];}
function staffCont(f){const m=freqToMidi(f),mi=Math.floor(m),fr=m-mi;return staffOfMidi(mi)+fr*(staffOfMidi(mi+1)-staffOfMidi(mi));}
function noteName(f){const m=Math.round(freqToMidi(f));return KEYS[((m%12)+12)%12]+(Math.floor(m/12)-1);}
function noteLetter(f){const m=Math.round(freqToMidi(f));return KEYS[((m%12)+12)%12];}
const SOLFEGE=['Do','Di','Re','Ri','Mi','Fa','Fi','Sol','Si','La','Li','Ti'];
function solfege(f){const m=Math.round(freqToMidi(f)),tn=Math.round(freqToMidi(semi(NOTE_FREQ.G4,transpose)));return SOLFEGE[(((m-tn)%12)+12)%12];}

let actx=null,master=null,silentEl=null;
function makeSilentWav(){const sr=8000,n=1600,ab=new ArrayBuffer(44+n*2),dv=new DataView(ab);const ws=(o,s)=>{for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));};ws(0,'RIFF');dv.setUint32(4,36+n*2,true);ws(8,'WAVE');ws(12,'fmt ');dv.setUint32(16,16,true);dv.setUint16(20,1,true);dv.setUint16(22,1,true);dv.setUint32(24,sr,true);dv.setUint32(28,sr*2,true);dv.setUint16(32,2,true);dv.setUint16(34,16,true);ws(36,'data');dv.setUint32(40,n*2,true);let bin='';const u8=new Uint8Array(ab);for(let i=0;i<u8.length;i++)bin+=String.fromCharCode(u8[i]);return 'data:audio/wav;base64,'+btoa(bin);}
function ensureCtx(){if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=.9;const lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=5000;master.connect(lp);lp.connect(actx.destination);}}
async function unlockAudio(){ensureCtx();try{await actx.resume();}catch(e){}const b=actx.createBuffer(1,1,22050),s=actx.createBufferSource();s.buffer=b;s.connect(actx.destination);s.start(0);if(!silentEl){silentEl=new Audio();silentEl.loop=true;silentEl.setAttribute('playsinline','');silentEl.src=makeSilentWav();}silentEl.play().catch(()=>{});}
function makeGuitar(freq,dur){const sr=actx.sampleRate,N=Math.max(2,Math.round(sr/freq)),len=Math.max(1,Math.floor(dur*sr));const buf=actx.createBuffer(1,len,sr),out=buf.getChannelData(0),ks=new Float32Array(N);for(let i=0;i<N;i++)ks[i]=Math.random()*2-1;for(let p=0;p<3;p++)for(let i=0;i<N;i++)ks[i]=0.5*(ks[i]+ks[(i+1)%N]);const damp=0.996;let ptr=0;for(let i=0;i<len;i++){const cur=ks[ptr],nxt=ks[(ptr+1)%N],v=damp*0.5*(cur+nxt);out[i]=cur;ks[ptr]=v;ptr=(ptr+1)%N;}for(let i=0;i<len;i++){const t=i/sr;let env=Math.min(1,i/(sr*0.004));env*=Math.exp(-t*2.6);const tail=(len-i)/sr;if(tail<0.03)env*=tail/0.03;out[i]*=env*0.85;}return buf;}
function clickAt(t,hi){const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=hi?1320:880;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.3,t+.005);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.connect(g);g.connect(master);o.start(t);o.stop(t+.14);}
let scheduled=[];
function instGain(){const n=inst.length;return n<=1?1:(n===2?0.6:0.45);}
function schedGuitar(t0,freq,dur){const ring=Math.max(dur,0.9);const src=actx.createBufferSource();src.buffer=makeGuitar(freq,ring);const g=actx.createGain();g.gain.value=0.9*instGain();src.connect(g);g.connect(master);src.start(t0);scheduled.push(src);}
function schedVoice(t0,freq,dur){const ring=Math.max(dur,0.45);const osc=actx.createOscillator();osc.type='sawtooth';osc.frequency.value=freq;const vib=actx.createOscillator();vib.type='sine';vib.frequency.value=5.2;const vibg=actx.createGain();vibg.gain.value=7;vib.connect(vibg);vibg.connect(osc.detune);vib.start(t0+0.25);vib.stop(t0+ring+0.1);const amp=actx.createGain();amp.gain.setValueAtTime(0,t0);amp.gain.linearRampToValueAtTime(0.5,t0+0.07);amp.gain.setValueAtTime(0.5,Math.max(t0+0.08,t0+dur-0.1));amp.gain.linearRampToValueAtTime(0,t0+ring);[[770,1.0,9],[1150,0.6,11],[2700,0.35,10]].forEach(([f,gn,q])=>{const bp=actx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=f;bp.Q.value=q;const fg=actx.createGain();fg.gain.value=gn*instGain();osc.connect(bp);bp.connect(fg);fg.connect(amp);});amp.connect(master);osc.start(t0);osc.stop(t0+ring+0.1);scheduled.push(osc);scheduled.push(vib);}
function schedPiano(t0,freq,dur){const ring=Math.max(dur,0.5)+0.4;const amp=actx.createGain();amp.gain.setValueAtTime(0,t0);amp.gain.linearRampToValueAtTime(0.5,t0+0.006);amp.gain.exponentialRampToValueAtTime(0.16,t0+0.3);amp.gain.exponentialRampToValueAtTime(0.0006,t0+ring);amp.connect(master);[[1,1],[2,0.42],[3,0.16],[4,0.07]].forEach(([h,gn])=>{const o=actx.createOscillator();o.type='triangle';o.frequency.value=freq*h;const og=actx.createGain();og.gain.value=gn*0.72*instGain();o.connect(og);og.connect(amp);o.start(t0);o.stop(t0+ring+0.05);scheduled.push(o);});}
function schedAnchor(t0,freq){const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(0.2,t0+0.04);g.gain.exponentialRampToValueAtTime(0.0008,t0+0.8);o.connect(g);g.connect(master);o.start(t0);o.stop(t0+0.85);scheduled.push(o);}
const INSTSEQ=['g','p','v','gv','pv','gpv'];
const INSTLBL={g:'♪ Guitar',p:'♪ Piano',v:'♪ Voice',gv:'♪ Guitar + Voice',pv:'♪ Piano + Voice',gpv:'♪ All three'};
function voiceNote(t,fr,d){if(inst.indexOf('g')>=0)schedGuitar(t,fr,d);if(inst.indexOf('p')>=0)schedPiano(t,fr,d);if(inst.indexOf('v')>=0)schedVoice(t,fr,d);}
function scheduleMelody(at){scheduled.forEach(n=>{try{n.stop()}catch(e){}});scheduled=[];const beat=60/bpm;let prevVi=-1;NOTES.forEach(n=>{if(n.start<playStart-1e-6||n.start>=playEnd-1e-6)return;const t0=at+(n.start-playStart);if(n.vi!==prevVi&&prevVi>=0)schedAnchor(t0-beat,n.freq);prevVi=n.vi;voiceNote(t0,n.freq,n.sustain);});}

let micStream=null,analyser=null,micBuf=null,micOn=false,detF=0,micLevel=0,heldF=0,heldT=0;
async function startMic(){ensureCtx();try{micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});const src=actx.createMediaStreamSource(micStream);const hp=actx.createBiquadFilter();hp.type='highpass';hp.frequency.value=75;const lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1500;analyser=actx.createAnalyser();analyser.fftSize=2048;micBuf=new Float32Array(analyser.fftSize);src.connect(hp);hp.connect(lp);lp.connect(analyser);micOn=true;return true;}catch(e){return false;}}
function stopMic(){micOn=false;detF=0;if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}}
let lastClarity=0;
function mpm(buf,sr){const N=buf.length;let rms=0;for(let i=0;i<N;i++)rms+=buf[i]*buf[i];rms=Math.sqrt(rms/N);micLevel=rms;if(rms<0.008)return -1;const tauMax=Math.min(N-2,Math.floor(sr/65));const nsdf=new Float32Array(tauMax+1);for(let tau=0;tau<=tauMax;tau++){let ac=0,m=0;for(let i=0;i+tau<N;i++){ac+=buf[i]*buf[i+tau];m+=buf[i]*buf[i]+buf[i+tau]*buf[i+tau];}nsdf[tau]=m>0?2*ac/m:0;}let tau=1;while(tau<tauMax&&nsdf[tau]>0)tau++;const maxima=[];while(tau<tauMax){if(nsdf[tau]>0){let pT=tau,pV=nsdf[tau];while(tau<tauMax&&nsdf[tau]>0){if(nsdf[tau]>pV){pV=nsdf[tau];pT=tau;}tau++;}maxima.push([pT,pV]);}else tau++;}if(!maxima.length)return -1;let hi=0;for(const m of maxima)if(m[1]>hi)hi=m[1];const th=0.9*hi;let ch=null;for(const m of maxima){if(m[1]>=th){ch=m;break;}}if(!ch)return -1;let T=ch[0];const x1=nsdf[T-1]||0,x2=nsdf[T],x3=nsdf[T+1]||0,a=(x1+x3-2*x2)/2,b=(x3-x1)/2;if(a)T=T-b/(2*a);lastClarity=Math.max(0,Math.min(1,ch[1]));if(ch[1]<0.5||T<=0)return -1;return sr/T;}
let pitchHist=[],badCount=0;function _med(a){const b=a.slice().sort((x,y)=>x-y),m=b.length>>1;return b.length%2?b[m]:(b[m-1]+b[m])/2;}
function readPitch(){if(!micOn||!analyser)return;analyser.getFloatTimeDomainData(micBuf);let f=mpm(micBuf,actx.sampleRate);if(f>70&&f<1100){badCount=0;if(detF>0){while(f>detF*1.8)f/=2;while(f<detF/1.8)f*=2;}pitchHist.push(f);if(pitchHist.length>5)pitchHist.shift();const md=_med(pitchHist);detF=detF?detF*0.4+md*0.6:md;heldF=detF;heldT=performance.now()/1000;}else{badCount++;if(badCount>=6){detF=0;pitchHist.length=0;}}}
function centsOff(u,t){if(!u||!t)return 999;let d=1200*Math.log2(u/t);d=((d%1200)+1200)%1200;if(d>600)d-=1200;return d;}

const canvas=document.getElementById('roll'),cx=canvas.getContext('2d');

function startPlay(){ensureCtx();NOTES=buildNotes();buildStruct();setPlayRange();onP=0;totP=0;hitSet.clear();trace=[];curSeg=-1;liveRun=0;rollStart=-1;lastActIdx=-1;dotYsm=null;wasInTune=false;clarSum=0;clarN=0;levelSum=0;levelN=0;wobbleSum=0;wobbleN=0;prevCents=null;timingSamples=[];noteLevels=[];curNoteHit=null;curNoteLvlSum=0;curNoteLvlN=0;lastScoredIdx=-1;lvlSm=0;const beat=60/bpm,t0=actx.currentTime+0.2;for(let i=0;i<countBeats;i++)clickAt(t0+i*beat,i===0);melodyStart=t0+countBeats*beat;scheduleMelody(melodyStart);const _fn=NOTES.find(n=>n.start>=playStart-1e-6);if(_fn)schedAnchor(melodyStart-beat,_fn.freq);playing=true;E.play.textContent='■ Stop';}
function stopPlay(){playing=false;E.play.textContent='▶ Play';scheduled.forEach(n=>{try{n.stop()}catch(e){}});scheduled=[];if(totP&&micOn)showReport();}
E.play.onclick=async()=>{await unlockAudio();playing?stopPlay():startPlay();};
E.mic.onclick=async()=>{await unlockAudio();if(micOn){stopMic();E.mic.classList.remove('on');E.mic.textContent='● Mic';return;}E.mic.textContent='…';const ok=await startMic();if(ok){E.mic.classList.add('on');E.mic.textContent='● Mic on';}else{E.mic.textContent='● Mic';showMicError();}};
E.inst.onclick=async()=>{await unlockAudio();inst=INSTSEQ[(INSTSEQ.indexOf(inst)+1)%INSTSEQ.length];E.inst.textContent=INSTLBL[inst];E.inst.classList.toggle('voice',inst!=='g');if(playing)startPlay();};
E.drill.onclick=async()=>{await unlockAudio();practiceLine=practiceLine>=3?-1:practiceLine+1;if(practiceLine>=0&&fullSong){fullSong=false;const fb=document.getElementById('fullBtn');fb.classList.remove('on2');fb.textContent='Whole hymn';}E.drill.textContent=practiceLine<0?'Drill: off':'Drill: line '+(practiceLine+1);E.drill.classList.toggle('on2',practiceLine>=0);rebuild();scrubT=playStart;if(playing)startPlay();refresh();};
function refresh(){E.keyVal.textContent=keyLabel();E.tempoVal.textContent=bpm;E.verseVal.textContent=fullSong?'all':(verse+1);}
document.getElementById('verseUp').onclick=()=>{if(fullSong){const beat=60/bpm,cur=Math.max(0,Math.min(4,Math.floor((scrubT+1e-3)/(50*beat))));scrubT=Math.min(4,cur+1)*50*beat;}else{verse=(verse+1)%5;rebuild();if(playing)startPlay();}refresh();};
document.getElementById('verseDown').onclick=()=>{if(fullSong){const beat=60/bpm,cur=Math.max(0,Math.min(4,Math.floor((scrubT+1e-3)/(50*beat))));scrubT=Math.max(0,cur-1)*50*beat;}else{verse=(verse+4)%5;rebuild();if(playing)startPlay();}refresh();};
document.getElementById('keyUp').onclick=()=>{if(transpose<7){transpose++;rebuild();if(playing)startPlay();refresh();}};
document.getElementById('keyDown').onclick=()=>{if(transpose>-7){transpose--;rebuild();if(playing)startPlay();refresh();}};
document.getElementById('tempoUp').onclick=()=>{bpm=Math.min(132,bpm+4);rebuild();if(playing)startPlay();refresh();};
document.getElementById('tempoDown').onclick=()=>{bpm=Math.max(44,bpm-4);rebuild();if(playing)startPlay();refresh();};
document.getElementById('zoomIn').onclick=()=>{zoom=Math.min(1.7,Math.round((zoom+0.15)*100)/100);};
document.getElementById('zoomOut').onclick=()=>{zoom=Math.max(0.7,Math.round((zoom-0.15)*100)/100);};
document.getElementById('fullBtn').onclick=async()=>{await unlockAudio();fullSong=!fullSong;const fb=document.getElementById('fullBtn');if(fullSong){practiceLine=-1;E.drill.textContent='Drill: off';E.drill.classList.remove('on2');}fb.classList.toggle('on2',fullSong);fb.textContent=fullSong?'Whole hymn \u2713':'Whole hymn';rebuild();scrubT=0;if(playing)startPlay();refresh();};
document.getElementById('lblBtn').onclick=()=>{labelMode=labelMode==='solfege'?'letter':(labelMode==='letter'?'off':'solfege');const lb=document.getElementById('lblBtn');lb.textContent=labelMode==='solfege'?'Do-Re-Mi':(labelMode==='letter'?'A-B-C':'Labels off');lb.classList.toggle('on2',labelMode!=='off');};
document.getElementById('wordsBtn').onclick=()=>{wordsMode=!wordsMode;const wb=document.getElementById('wordsBtn');wb.classList.toggle('on2',wordsMode);wb.textContent=wordsMode?'Words ✓':'Words';};

const overlay=document.getElementById('overlay'),card=document.getElementById('card');
window.closeOv=()=>overlay.classList.remove('show');
function _avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;}
function _sd(a){if(a.length<2)return 0;const m=_avg(a);return Math.sqrt(a.reduce((s,v)=>s+(v-m)*(v-m),0)/a.length);}
function analyzeVibrato(){let n=0,vib=0;for(const note of NOTES){if(!note.syl||note.beats<2||note.start<playStart||note.start>=playEnd)continue;const seg=trace.filter(p=>p.t>=note.start+0.15&&p.t<=note.start+note.sustain&&p.f>0);if(seg.length<8)continue;n++;const cents=seg.map(p=>{const fold=p.f*Math.pow(2,Math.round(Math.log2(note.freq/p.f)));return 1200*Math.log2(fold/note.freq);});const dev=cents.map(c=>c-_avg(cents));let cross=0;for(let i=1;i<dev.length;i++)if((dev[i-1]<0)!==(dev[i]<0))cross++;const dur=seg[seg.length-1].t-seg[0].t,fr=dur>0?(cross/2)/dur:0,sd=_sd(cents);if(fr>=3.5&&fr<=8&&sd>=12&&sd<=80)vib++;}return{n:n,frac:n?vib/n:0};}
function showReport(){var pct=Math.round(100*onP/Math.max(1,totP));var sung=NOTES.filter(function(n){return n.syl&&n.start>=playStart&&n.start<playEnd;});var hits=sung.filter(function(n){return hitSet.has(n.idx);}).length;var run=0,best=0;sung.forEach(function(n){if(hitSet.has(n.idx)){run++;best=Math.max(best,run);}else run=0;});var missed=sung.filter(function(n){return !hitSet.has(n.idx);}).map(function(n){return n.syl.replace(/[-,!;.]$/,'');});var msg=pct>=85?'Beautiful \u2014 you sang that with real confidence.':pct>=65?'Lovely \u2014 your ear is finding the notes.':pct>=40?'Good progress. Try it slower and let each note settle.':'Keep going \u2014 slow the tempo, breathe at the commas, and aim for the line.';var chips=missed.length?('<p>Words to revisit:</p><div class="chips">'+missed.slice(0,12).map(function(w){return '<span class="chip">'+w+'</span>';}).join('')+'</div><p style="font-size:12px;color:var(--muted);margin-top:3px">Drill their line at a slower tempo, then build the speed back up.</p>'):'<p>You held every word in tune \u2014 wonderful.</p>';var nxt=(practiceLine<0&&!fullSong&&verse<4)?'<br><button onclick="nextVerse()">Try verse '+(verse+2)+'</button>':'';var clar=clarN?clarSum/clarN:0,lvl=levelN?levelSum/levelN:0,wob=wobbleN?wobbleSum/wobbleN:0;var step;if(pct<65)step='Slow the tempo with \u2013 and use Drill to loop one line until it feels easy, then build back up.';else if(coach.timing&&timingSamples.length>4&&_avg(timingSamples)>=0.3)step='Focus on your entrances \u2014 the count ends just as you begin; sing each word the moment the cursor reaches it.';else if(coach.steady&&wobbleN>10&&wob>=16)step='Steady your held notes \u2014 keep the air flowing evenly, and Drill the line with the long note.';else if(coach.dynamics&&noteLevels.length>6&&(_sd(noteLevels)/Math.max(1e-6,_avg(noteLevels)))<0.18)step='Add shape \u2014 grow louder toward the high note of each line and ease off at the commas.';else if(coach.bold&&levelN>10&&lvl<0.03)step='Sing out \u2014 take a deeper breath and let your voice fill the room.';else if(coach.clarity&&clarN>10&&clar<0.78)step='Open your vowels for a clearer, more forward tone.';else step=(practiceLine<0&&!fullSong&&verse<4)?'Try the next verse and keep building confidence.':'Sing it through once more and enjoy it.';var stepHtml='<p style="color:var(--gold-bright);margin-top:6px"><b>Next step:</b> '+step+'</p>';var vq=[];if(coach.clarity&&clarN>10)vq.push(clar>0.9?'Clear, focused tone.':clar>0.78?'Open the vowel a touch more \u2014 drop the jaw on \u201cah\u201d so it rings.':'For a clearer tone, open your mouth more and aim the sound forward, to the back wall.');if(coach.steady&&wobbleN>10)vq.push(wob<8?'Steady, controlled held notes.':wob<16?'On held notes keep the air even \u2014 a slow, steady breath out.':'Held notes wavered \u2014 hold one long note with steady air, then Drill that line slowly.');if(coach.bold&&levelN>10)vq.push(lvl>0.06?'You sang out with confidence.':lvl>0.03?'Take a fuller breath before each line and let it carry.':'Sing out louder \u2014 breathe deep into your belly and fill the room.');if(coach.timing&&timingSamples.length>4){var tav=_avg(timingSamples);vq.push(tav<0.12?'Your entries land right with the beat.':tav<0.3?'Come in a touch sooner \u2014 sing the word the instant the cursor reaches it.':'You entered late \u2014 breathe on the 2nd count so you are ready to sing on 1.');}if(coach.dynamics&&noteLevels.length>6){var dm=_avg(noteLevels),dsd=_sd(noteLevels),cv=dm>0?dsd/dm:0;vq.push(cv>0.35?'Lovely dynamic shaping across the phrases.':cv>0.18?'Add a little more shape \u2014 grow toward the highest note of each line.':'Shape each phrase \u2014 start gently, swell to the high note, ease off at the comma.');}if(coach.vibrato){var vr=analyzeVibrato();if(vr.n>=2)vq.push(vr.frac>0.5?'A natural vibrato is warming your held notes.':vr.frac>0?'A gentle vibrato is emerging on held notes.':'Your held notes are straight and pure.');}card.innerHTML='<h2>'+pct+'% on pitch</h2><div class="range-row"><div class="item">Notes landed<b>'+hits+'/'+sung.length+'</b></div><div class="item">Best run<b>'+best+'</b></div></div>'+stepHtml+'<p>'+msg+'</p>'+(vq.length?'<p style="color:var(--cream);margin-top:2px;line-height:1.5">'+vq.join('<br>')+'</p>':'')+chips+'<button class="primary" onclick="closeOv()">Sing again</button>'+nxt;overlay.classList.add('show');}
window.nextVerse=()=>{verse=(verse+1)%5;NOTES=buildNotes();buildStruct();setPlayRange();refresh();closeOv();};
document.getElementById('helpBtn').onclick=()=>showGuide();
document.getElementById('coachBtn').onclick=function(){showCoach();};
window.toggleCoach=function(k){coach[k]=!coach[k];saveCoach();showCoach();};
function _coachRows(rows){var h='';rows.forEach(function(r){var on=coach[r[0]];h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 2px;border-bottom:1px solid #3a2f22"><span style="font-size:15px;color:var(--cream)">'+r[1]+'</span><button class="'+(on?'on2':'')+'" onclick="toggleCoach(\''+r[0]+'\')">'+(on?'On':'Off')+'</button></div>';});return h;}
function showCoach(){var live=[['liveGuide','Guidance words (higher / lower)'],['liveRoll','\u201cOn a roll\u201d cue'],['liveBreath','Breathe reminders at line ends'],['liveSingOut','\u201cSing out\u201d nudge when quiet']];var rep=[['clarity','Tone clarity'],['steady','Steadiness'],['bold','Sing-out / volume'],['timing','Timing'],['dynamics','Dynamics'],['vibrato','Vibrato']];var html='<h2>Coaching</h2><p>Turn any feedback on or off. The pitch dot and arrows always stay on.</p><div style="text-align:left;margin:4px 0 10px"><div style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-bright);margin:4px 0 2px">During the song</div>'+_coachRows(live)+'<div style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-bright);margin:12px 0 2px">End-of-song report</div>'+_coachRows(rep)+'</div><button class="primary" onclick="closeOv()">Done</button>';card.innerHTML=html;overlay.classList.add('show');}
function showGuide(){card.innerHTML='<h2>How to use this</h2><p style="text-align:left;line-height:1.55"><b>1. Find your key.</b> Tap <b>My range</b> and sing “ah” from low to high — it sets the most comfortable key for your voice. Or use key – / +.<br><br><b>2. Press Play.</b> Three beats count you in and you’ll hear your first note. Sing the word under the moving line.<br><br><b>3. Follow the dot.</b> The glowing dot is your own voice. It turns blue-green when you land on the note; an arrow shows ↑ sing higher or ↓ lower, and the note lights up green along its length while you hold it in tune.<br><br><b>The markings teach the music:</b> the <b>Do–Re–Mi</b> names show the tune’s shape, faint <b>bar lines</b> are the 3/4 sway, a <b>curved slur</b> means one word glides across two notes, and the small <b>comma</b> is where to breathe.<br><br><b>Explore.</b> Drag the music to scroll anywhere; –/+ zoom in and out; <b>Whole hymn</b> sings all the verses; <b>Drill</b> loops one line for practice.</p><button class="primary" onclick="closeOv()">Got it</button>';overlay.classList.add('show');}
function showMicError(){card.innerHTML='<h2>Mic needs a secure page</h2><p>Browsers only allow microphone access over <b>https://</b>. Host this file on <b>tiiny.host</b>, <b>Netlify Drop</b>, or <b>GitHub Pages</b>.</p><button class="primary" onclick="closeOv()">Got it</button>';overlay.classList.add('show');}
let rangeActive=false,rMin=0,rMax=0,rTimer=null,rsamp=[];
document.getElementById('rangeBtn').onclick=async()=>{await unlockAudio();if(!micOn){const ok=await startMic();if(ok){E.mic.classList.add('on');E.mic.textContent='● Mic on';}else{showMicError();return;}}runRange();};
function runRange(){rsamp=[];let secs=14;card.innerHTML='<h2>Find your range</h2><p>Sing “ah” and slide <b>slowly</b> from your <b>lowest</b> comfortable note up to your <b>highest</b> — don’t strain at the ends.</p><div class="big-note" id="rNote">—</div><div class="lvl"><i id="rLvl"></i></div><p class="hint" id="rTime">'+secs+'s</p>';overlay.classList.add('show');rangeActive=true;const tick=()=>{if(!rangeActive)return;readPitch();const lv=document.getElementById('rLvl');if(lv)lv.style.width=Math.min(100,micLevel*900)+'%';if(detF>55&&detF<1200&&micLevel>0.015){rsamp.push(detF);const rn=document.getElementById('rNote');if(rn)rn.textContent=noteName(detF);}r2=requestAnimationFrame(tick);};let r2=requestAnimationFrame(tick);rTimer=setInterval(()=>{secs--;const el=document.getElementById('rTime');if(el)el.textContent=secs+'s';if(secs<=0){clearInterval(rTimer);rangeActive=false;cancelAnimationFrame(r2);showRangeResult();}},1000);}
function shiftedKey(s){let i=(7+s)%12;if(i<0)i+=12;return KEYS[i];}
function midiName(m){m=Math.round(m);return KEYS[((m%12)+12)%12]+(Math.floor(m/12)-1);}
function songStats(){let lo=999,hi=0,w=0,ms=0;TUNE.forEach(([nm,b])=>{const m=freqToMidi(NOTE_FREQ[nm]);lo=Math.min(lo,m);hi=Math.max(hi,m);w+=b;ms+=m*b;});return{lo:Math.round(lo),hi:Math.round(hi),center:ms/w};}
function recommendKey(loHz,hiHz){const st=songStats(),loM=freqToMidi(loHz),hiM=freqToMidi(hiHz),span=hiM-loM;const target=loM+0.42*span;let T=target-st.center;const room=hiM-st.hi,floor=loM-st.lo;if(room>=floor)T=Math.max(floor,Math.min(room,T));else T=((loM+hiM)/2)-((st.lo+st.hi)/2);T=Math.max(-7,Math.min(7,Math.round(T)));const sLo=st.lo+T,sHi=st.hi+T;return{T,sLo,sHi,loM:Math.round(loM),hiM:Math.round(hiM),fits:(sLo>=Math.round(loM)-0&&sHi<=Math.round(hiM)+0)};}
function showRangeResult(){const v=rsamp.slice().sort((a,b)=>a-b);if(v.length<8){card.innerHTML='<h2>Didn\'t catch enough</h2><p>I didn’t hear a clear, steady pitch. Try again in a quiet spot — sing “ah” a little louder and hold each note a moment.</p><button class="primary" onclick="runRange()">Try again</button><br><button onclick="closeOv()">Close</button>';return;}const pct=p=>v[Math.max(0,Math.min(v.length-1,Math.round(p*(v.length-1))))];rMin=pct(0.08);rMax=pct(0.92);const r=recommendKey(rMin,rMax),K=shiftedKey(r.T);let why=r.fits?'The whole hymn fits inside your range, centered where your voice is most relaxed.':('This is the closest fit. '+(r.sHi>r.hiM?'The top note ('+midiName(r.sHi)+') may feel high — ':'')+(r.sLo<r.loM?'the lowest note ('+midiName(r.sLo)+') may feel low — ':'')+'ease into the extremes gently.');card.innerHTML='<h2>Your range</h2><div class="range-row"><div class="item">Lowest<b>'+midiName(r.loM)+'</b></div><div class="item">Highest<b>'+midiName(r.hiM)+'</b></div></div><p>In <b>key '+K+'</b>, this hymn runs <b>'+midiName(r.sLo)+'–'+midiName(r.sHi)+'</b>. '+why+'</p><button class="primary" onclick="applySug('+r.T+')">Set key to '+K+'</button><br><button onclick="closeOv()">Keep current key</button>';}
window.applySug=(s)=>{transpose=Math.max(-7,Math.min(7,s));rebuild();refresh();if(playing)startPlay();closeOv();};
canvas.addEventListener('pointerdown',e=>{if(playing)return;e.preventDefault();unlockAudio();scrubbing=true;lastScrubNote=-1;lastX=e.clientX;try{canvas.setPointerCapture(e.pointerId);}catch(_){}const rect=canvas.getBoundingClientRect();const px=e.clientX-rect.left;scrubT=Math.max(playStart,Math.min(playEnd,scrubT+(px-_cursorX)/_pps));});
canvas.addEventListener('pointermove',e=>{if(!scrubbing)return;e.preventDefault();const dx=e.clientX-lastX;lastX=e.clientX;scrubT=Math.max(playStart,Math.min(playEnd,scrubT+dx/_pps));});
function endScrub(e){if(!scrubbing)return;scrubbing=false;try{canvas.releasePointerCapture(e.pointerId);}catch(_){}}
canvas.addEventListener('pointerup',endScrub);canvas.addEventListener('pointercancel',endScrub);
setPlayRange();resize();geom();refresh();raf=requestAnimationFrame(draw);
</script>
